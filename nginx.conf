server {
    listen 80;
    server_name garin.fankynas.cloud;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name garin.fankynas.cloud;

    # SSL Certificate (gunakan Let's Encrypt / Certbot)
    # sudo certbot --nginx -d garin.fankynas.cloud
    ssl_certificate /etc/letsencrypt/live/garin.fankynas.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/garin.fankynas.cloud/privkey.pem;

    # Upload size (untuk video besar)
    client_max_body_size 500M;

    # Proxy ke Node.js server di port 5017
    location / {
        proxy_pass http://localhost:5017;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
    }

    # Static files caching
    location /uploads {
        alias /path/to/tiktok-clone/server/uploads;
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }
}
